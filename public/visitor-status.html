<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit Status — VisitorGate</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .status-card {
            text-align: center;
            padding: 40px 32px;
        }

        .status-header-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            background: var(--primary-bg);
            color: var(--primary);
        }

        .status-header-icon svg {
            width: 36px;
            height: 36px;
        }

        .status-badge-lg {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 20px;
        }

        .sms-timeline {
            margin-top: 32px;
            text-align: left;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .sms-timeline-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tl-track {
            border-left: 2px solid var(--gray-100);
            padding-left: 20px;
            margin-left: 10px;
        }

        .tl-item {
            margin-bottom: 20px;
            position: relative;
        }

        .tl-dot {
            position: absolute;
            left: -27px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gray-300);
            border: 2px solid var(--bg-card);
        }

        .tl-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tl-label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tl-time {
            font-size: 0.6875rem;
            color: var(--text-muted);
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(30, 58, 95, 0.3); }
            70% { box-shadow: 0 0 0 8px rgba(30, 58, 95, 0); }
            100% { box-shadow: 0 0 0 0 rgba(30, 58, 95, 0); }
        }

        .pulse-dot {
            animation: pulse-ring 2s infinite;
        }
    </style>
</head>

<body class="bg-dark flex-center" style="min-height:100vh; padding: 20px">
    <div class="visitor-page">
        <div class="brand">
            <i data-lucide="shield-check"></i>
            VisitorGate
        </div>

        <!-- LOADING STATE -->
        <div id="loading" class="card text-center" style="padding:60px 40px">
            <div class="spinner mb-20"></div>
            <p class="text-sm text-muted">Checking visit request status...</p>
        </div>

        <!-- STATUS VIEW -->
        <div id="status-view" class="card status-card animate-slide" style="display:none">
            <div id="s-icon-box" class="status-header-icon">
                <i data-lucide="clock" id="s-lucide-icon"></i>
            </div>
            <h2 id="s-title" style="font-size:1.5rem; letter-spacing:-0.02em">Processing Request</h2>
            <p id="s-msg" class="text-secondary mt-12" style="font-size:0.9rem">Your request is currently being reviewed by the staff.</p>
            
            <div id="s-badge" class="status-badge-lg badge-yellow">
                <i data-lucide="timer" style="width:14px;height:14px"></i>
                PENDING
            </div>

            <!-- APPROVED ADDITIONAL INFO -->
            <div id="approved-info" style="display:none; margin-top:32px; padding-top:28px; border-top:1px solid var(--border)">
                <div class="p-16 text-center" style="background:var(--primary-bg); border-radius:var(--radius); border:1px solid var(--primary-glow)">
                    <p class="text-sm fw-600 color-primary" style="color:var(--primary)">
                         Please proceed to the main entrance
                    </p>
                    <div class="mt-8 text-xs text-secondary" style="opacity:0.8">
                        Approved at <span id="s-time" class="fw-700"></span>
                    </div>
                </div>
                <div class="mt-20">
                    <p class="text-xs text-muted">You may be asked to show this screen to the security officer.</p>
                </div>
            </div>

            <!-- SMS TIMELINE -->
            <div id="sms-timeline" class="sms-timeline">
                <div class="sms-timeline-title">
                    <i data-lucide="smartphone" style="width:14px;height:14px"></i>
                    Notification Activity
                </div>
                <div id="sms-track" class="tl-track">
                    <!-- Dynamic Items -->
                </div>
            </div>
        </div>

        <div class="text-center mt-32">
            <p class="text-xs text-muted">© 2026 VisitorGate Technologies</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let lastStatus = '';
        let lastResponse = '';

        async function checkStatus() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return;

            try {
                // Use the globally available api.js
                const req = await api.get('/visitor-requests/' + id);

                if (!req) {
                    document.getElementById('loading').innerHTML = `
                        <div class="status-header-icon" style="background:var(--red-bg);color:var(--red)">
                            <i data-lucide="alert-circle"></i>
                        </div>
                        <h2 style="font-size:1.25rem">Request Not Found</h2>
                        <p class="text-muted mt-8 text-sm">The request might have expired or was removed from the system.</p>
                        <a href="index.html" class="btn btn-ghost btn-sm mt-24">Back to Home</a>
                    `;
                    lucide.createIcons();
                    return;
                }

                if (JSON.stringify(req) === lastResponse) return;
                lastResponse = JSON.stringify(req);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('status-view').style.display = 'block';

                const iconBox = document.getElementById('s-icon-box');
                const lucideIcon = document.getElementById('s-lucide-icon');
                const title = document.getElementById('s-title');
                const msg = document.getElementById('s-msg');
                const badge = document.getElementById('s-badge');

                if (req.approval_status === 'APPROVED') {
                    iconBox.style.background = 'var(--green-bg)';
                    iconBox.style.color = 'var(--green)';
                    lucideIcon.setAttribute('data-lucide', 'check-circle');
                    title.textContent = 'Visit Approved';
                    msg.innerHTML = `Please proceed to the entrance. You are meeting with <span class="fw-700">${req.staff_name}</span> from <span class="fw-700">${req.department_name || 'the department'}</span>.`;
                    badge.innerHTML = '<i data-lucide="check" style="width:14px;height:14px"></i> APPROVED';
                    badge.className = 'status-badge-lg badge-green';
                    document.getElementById('approved-info').style.display = 'block';
                    document.getElementById('s-time').textContent = req.approval_time ? new Date(req.approval_time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : 'Just now';
                } else if (req.approval_status === 'REJECTED') {
                    iconBox.style.background = 'var(--red-bg)';
                    iconBox.style.color = 'var(--red)';
                    lucideIcon.setAttribute('data-lucide', 'x-circle');
                    title.textContent = 'Unable to Meet';
                    msg.innerHTML = `Unfortunately, <span class="fw-700">${req.staff_name}</span> is unable to meet at this time.<br><div class="card mt-12 p-12 text-sm" style="background:var(--bg-body)"><b>Reason:</b> ${req.rejection_reason || 'Busy with previous commitments'}</div>`;
                    badge.innerHTML = '<i data-lucide="info" style="width:14px;height:14px"></i> DECLINED';
                    badge.className = 'status-badge-lg badge-red';
                    document.getElementById('approved-info').style.display = 'none';
                } else if (req.approval_status === 'BUSY') {
                    iconBox.style.background = 'var(--yellow-bg)';
                    iconBox.style.color = 'var(--yellow)';
                    lucideIcon.setAttribute('data-lucide', 'clock');
                    title.textContent = 'Staff is Busy';
                    msg.innerHTML = `<span class="fw-700">${req.staff_name}</span> is currently in another meeting. Please wait at the reception area.`;
                    badge.innerHTML = '<i data-lucide="timer" style="width:14px;height:14px"></i> PLEASE WAIT';
                    badge.className = 'status-badge-lg badge-yellow';
                    document.getElementById('approved-info').style.display = 'none';
                } else {
                    iconBox.style.background = 'var(--primary-bg)';
                    iconBox.style.color = 'var(--primary)';
                    lucideIcon.setAttribute('data-lucide', 'loader-2');
                    lucideIcon.style.animation = 'spin 2s linear infinite';
                    title.textContent = 'Pending Approval';
                    msg.textContent = 'Your request has been sent. Please wait for the staff member to respond.';
                    badge.innerHTML = '<i data-lucide="clock" style="width:14px;height:14px"></i> PROCESSING';
                    badge.className = 'status-badge-lg badge-yellow';
                    document.getElementById('approved-info').style.display = 'none';
                }

                lucide.createIcons();

                // Load SMS notification timeline
                if (req.approval_status !== lastStatus) {
                    lastStatus = req.approval_status;
                    loadSMSTimeline(id);
                }
            } catch (e) {
                console.error(e);
                if (e.message.includes('404')) {
                    document.getElementById('loading').innerHTML = `
                         <div class="status-header-icon" style="background:var(--red-bg);color:var(--red)">
                            <i data-lucide="alert-triangle"></i>
                        </div>
                        <h3>Link Expired</h3>
                        <p class="text-muted mt-8 text-sm">This status link is no longer active.</p>
                    `;
                    lucide.createIcons();
                }
            }
        }

        async function loadSMSTimeline(requestId) {
            try {
                // Use the globally available api.js
                const smsData = await api.get('/sms-notifications/' + requestId);
                const track = document.getElementById('sms-track');

                if (!smsData || smsData.length === 0) {
                    track.innerHTML = `
                        <div class="tl-item">
                            <div class="tl-dot"></div>
                            <div class="tl-content">
                                <div class="tl-label" style="color:var(--text-muted)">Awaiting system notifications...</div>
                            </div>
                        </div>`;
                    return;
                }

                track.innerHTML = smsData.map(sms => {
                    const isToStaff = sms.direction === 'TO_STAFF';
                    const statusColor = sms.status === 'SENT' ? 'var(--green)' : sms.status === 'FAILED' ? 'var(--red)' : 'var(--yellow)';
                    const statusIcon = sms.status === 'SENT' ? 'check' : sms.status === 'FAILED' ? 'alert-circle' : 'clock';
                    const label = isToStaff ? 'Staff Notification' : 'Visitor Alert';
                    const phone = sms.recipient_phone.replace(/(\d{2})(\d{4,})(\d{2})/, '$1****$3');
                    const time = new Date(sms.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

                    return `
                        <div class="tl-item">
                            <div class="tl-dot ${sms.status === 'QUEUED' ? 'pulse-dot' : ''}" style="background:${statusColor}"></div>
                            <div class="tl-content">
                                <div class="tl-label">
                                    <i data-lucide="${isToStaff ? 'user-check' : 'user'}" style="width:14px;height:14px;color:${statusColor}"></i>
                                    ${label}
                                    <span class="text-xs" style="color:${statusColor}; font-weight:400; font-size:10px; opacity:0.8">• ${sms.status}</span>
                                </div>
                                <div class="tl-time">${phone} • ${time}</div>
                            </div>
                        </div>`;
                }).join('');
                lucide.createIcons();
            } catch (e) {
                console.warn('SMS timeline load error:', e);
            }
        }

        lucide.createIcons();
        setInterval(checkStatus, 3000);
        checkStatus();
    </script>
</body>

</html>
