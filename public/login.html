<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — VisitorGate</title>
    <meta name="description"
        content="Secure login portal for VisitorGate QR-based Visitor Management System. Access admin, security, and staff dashboards.">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark flex-center" style="min-height:100vh">
    <div class="mesh-bg"></div>
    <div id="loading-bar" class="loading-bar"></div>

    <div class="login-card fade-in">
        <!-- Logo -->
        <div class="login-logo">🛡️</div>
        <h2 class="text-center mb-4" style="font-size:1.5rem;">Welcome Back</h2>
        <p class="text-center text-muted mb-32" style="font-size:0.85rem;">Sign in to your VisitorGate account</p>

        <!-- Error Alert -->
        <div id="login-error" class="login-error"></div>

        <!-- Login Form -->
        <form id="login-form" autocomplete="on">
            <div class="form-group">
                <label class="form-label" for="email">Email or Staff ID</label>
                <input type="text" id="email" name="email" required placeholder="you@visitorgate.com or VG-STF-001"
                    autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position:relative">
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        autocomplete="current-password">
                    <button type="button" id="toggle-password"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;padding:4px;"
                        aria-label="Toggle password visibility">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 mt-8" id="login-btn">
                <span id="btn-text">Sign In</span>
                <span id="btn-spinner" class="spinner" style="display:none"></span>
            </button>
        </form>

        <!-- Role Indicator -->
        <div id="role-indicator" style="display:none; margin-top:20px; text-align:center;">
            <div
                style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-size:0.8rem;font-weight:600;">
            </div>
        </div>

        <div class="text-center mt-24">
            <p class="text-xs text-muted">🔒 Secured with enterprise-grade encryption</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
