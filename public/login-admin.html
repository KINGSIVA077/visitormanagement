<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VisitorGate</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-dark flex-center" style="min-height:100vh">
    <div class="login-card fade-in">
        <div class="text-center mb-32">
            <div class="login-logo">
                <i data-lucide="settings" style="width:28px;height:28px;color:var(--primary)"></i>
            </div>
            <h1 style="font-size:1.4rem;" class="mt-16">Admin Login</h1>
            <p class="text-muted" style="font-size:0.85rem;">Access the management portal</p>
        </div>
        <form id="login-form">
            <div id="login-error" class="badge badge-red mb-16 w-100 text-center" style="display:none; padding:10px">
            </div>
            <div class="form-group">
                <label class="form-label">Email or Staff ID</label>
                <input type="text" id="email" required placeholder="admin@visitorgate.com"
                    value="admin@visitorgate.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" required placeholder="••••••••" value="admin">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg mt-8" id="login-btn">Sign In</button>
        </form>
        <div class="text-center mt-24">
            <a href="index.html" class="text-xs text-muted" style="display:inline-flex;align-items:center;gap:4px;">
                <i data-lucide="arrow-left" style="width:12px;height:12px"></i>
                Back to Home
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();

        if (typeof auth !== 'undefined' && auth.checkExistingSession) {
            auth.checkExistingSession();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            err.style.display = 'none';

            try {
                const res = await fetch(window.location.origin + '/auth/v1/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                if (data.user.role !== 'admin') throw new Error('Invalid admin credentials or role');

                localStorage.setItem('vms_user', JSON.stringify(data.user));
                localStorage.setItem('vms_token', data.access_token);
                window.location.href = 'admin.html';
            } catch (e) {
                err.textContent = e.message;
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
