<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Visitor — VisitorGate</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .verify-card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            text-align: center;
            border: 1px solid var(--border);
        }

        .status-header {
            padding: 48px 24px;
            color: white;
            text-align: center;
            position: relative;
        }

        .status-header.verified { background: var(--green); }
        .status-header.invalid { background: var(--red); }
        .status-header.pending { background: var(--yellow); }

        .status-icon-glow {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .status-header svg {
            width: 40px;
            height: 40px;
        }

        .status-text {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .details {
            padding: 32px;
            background: var(--bg-card);
            position: relative;
        }

        .visitor-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            box-shadow: var(--shadow-md);
            margin: -85px auto 16px;
            background: var(--gray-100);
            object-fit: cover;
            display: block;
        }

        .visitor-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .visitor-purpose {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 28px;
        }

        .info-grid {
            text-align: left;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
            padding: 20px;
            background: var(--gray-50);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .info-item .label {
            font-size: 0.65rem;
            color: var(--gray-500);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 4px;
        }

        .info-item .value {
            font-size: 0.8125rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        #loading { padding: 60px 40px; display: flex; flex-direction: column; align-items: center; }

        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
    </style>
</head>
<body class="bg-dark flex-center" style="min-height:100vh; padding: 20px">
    <div id="loading" class="verify-card animate-fade">
        <div class="status-icon-glow pulse" style="background: var(--primary-bg); color: var(--primary)">
            <i data-lucide="search"></i>
        </div>
        <h3 class="mt-16">Verifying Ticket</h3>
        <p class="text-sm text-muted mt-8">Checking pass validity with server...</p>
    </div>

    <div id="result" class="verify-card animate-slide" style="display: none;">
        <div id="header" class="status-header">
            <div class="status-icon-glow">
                <i data-lucide="check-circle" id="icon"></i>
            </div>
            <div id="status" class="status-text">Verified</div>
        </div>

        <div class="details">
            <img id="photo" src="" alt="Visitor" class="visitor-photo">
            
            <h1 id="name" class="visitor-name">-</h1>
            <p id="purpose" class="visitor-purpose">-</p>

            <div class="info-grid">
                <div class="info-item">
                    <span class="label">Pass ID</span>
                    <span id="pass-id" class="value">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Department</span>
                    <span id="dept" class="value">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Meeting With</span>
                    <span id="staff" class="value">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Approved Time</span>
                    <span id="time" class="value">-</span>
                </div>
            </div>

            <button id="checkin-btn" class="btn btn-primary btn-lg w-100" onclick="handleCheckin()">
                <i data-lucide="log-in" style="width:18px;height:18px"></i>
                Check In Visitor
            </button>
        </div>

        <div class="p-16 text-center" style="border-top: 1px solid var(--border); background: var(--gray-50)">
             <p class="text-xs text-muted">© 2026 VisitorGate Secure Verification</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentRequestId = null;

        async function verify() {
            lucide.createIcons();
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                showError('Invalid Verification Link');
                return;
            }
            currentRequestId = id;

            try {
                // Use the globally available api object if present, else fallback to fetch
                let data;
                if (typeof api !== 'undefined' && api.get) {
                    data = await api.get('/visitor-requests/' + id);
                } else {
                    const res = await fetch('/api/visitor-requests/' + id);
                    if (!res.ok) throw new Error('Not found');
                    data = await res.json();
                }

                if (!data) {
                    showError('Record Not Found');
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';

                // Map data
                document.getElementById('name').textContent = data.visitor_name;
                document.getElementById('purpose').textContent = data.form_data?.purpose || 'General Visit';
                document.getElementById('pass-id').textContent = data.pass_id || ('REQ-' + data.id.slice(-6).toUpperCase());
                document.getElementById('dept').textContent = data.department_name || '-';
                document.getElementById('staff').textContent = data.staff_name || '-';
                document.getElementById('time').textContent = data.approval_time ? new Date(data.approval_time).toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' }) : 'N/A';
                document.getElementById('photo').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.visitor_name)}&background=1e3a5f&color=fff&size=200&bold=true`;

                const header = document.getElementById('header');
                const icon = document.getElementById('icon');
                const status = document.getElementById('status');
                const btn = document.getElementById('checkin-btn');

                if (data.approval_status === 'APPROVED') {
                    header.className = 'status-header verified';
                    icon.setAttribute('data-lucide', 'check-circle');
                    status.textContent = 'Pass Verified';
                    btn.innerHTML = '<i data-lucide="log-in" style="width:18px;height:18px"></i> Check In Visitor';
                } else if (data.approval_status === 'CHECKED_IN') {
                    header.className = 'status-header verified';
                    icon.setAttribute('data-lucide', 'building');
                    status.textContent = 'Inside Campus';
                    btn.disabled = true;
                    btn.innerHTML = '<i data-lucide="check" style="width:18px;height:18px"></i> Already Checked In';
                } else if (data.approval_status === 'PENDING') {
                    header.className = 'status-header pending';
                    icon.setAttribute('data-lucide', 'clock');
                    status.textContent = 'Pending Approval';
                    btn.disabled = true;
                    btn.innerHTML = 'Awaiting Staff Response';
                } else {
                    header.className = 'status-header invalid';
                    icon.setAttribute('data-lucide', 'x-circle');
                    status.textContent = 'Invalid / Expired';
                    btn.disabled = true;
                    btn.innerHTML = 'Invalid Pass';
                }

                lucide.createIcons();

            } catch (e) {
                console.error(e);
                showError('Verification Failed');
            }
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('header').className = 'status-header invalid';
            const icon = document.getElementById('icon');
            icon.setAttribute('data-lucide', 'alert-triangle');
            document.getElementById('status').textContent = 'Error';
            document.getElementById('name').textContent = msg;
            document.getElementById('purpose').textContent = 'Please contact system administrator.';
            document.getElementById('checkin-btn').style.display = 'none';
            lucide.createIcons();
        }

        async function handleCheckin() {
            const btn = document.getElementById('checkin-btn');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Processing...';

            try {
                const res = await fetch('/api/checkins', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitor_request_id: currentRequestId,
                        security_id: 'sec-user-111', 
                        gate_location: 'Main Gate'
                    })
                });

                if (res.ok) {
                    location.reload();
                } else {
                    const err = await res.json();
                    alert('Check-in failed: ' + (err.error || 'Unknown error'));
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                }
            } catch (e) {
                alert('Connection error');
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        verify();
    </script>
</body>
</html>
